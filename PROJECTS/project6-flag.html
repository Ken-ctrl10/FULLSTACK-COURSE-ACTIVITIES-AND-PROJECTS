<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 6 | Flag</title>

  <style>
    .flag{
      width: 900px;
      height: 600px;
      background-color: #CE1126;

      position: relative;
    }

    .flag > p {
      text-align: center;
      color: white;
      font-size: 50pt;
    }


    .flag > div {
      width: 100%;
      height: 300px;
      top: 150px;
      background-color: #002868;
     
      position: absolute;
    }



    .flag > div > div {
      height: 200px;
      width: 200px;
      font-size: 60pt;
      background-color: white;
      border-radius: 50%;
      text-align: center;

      position: relative;
      left: 340px;
      top: 50px;
    }

    .flag > div > div > p{
      margin: 0;
    }


  </style>
</head>

<!-- 
  IMPORTANT: Do not change any HTMl, Don't add any classes/ids/elements.
  Use what you know about combining selectors and CSS specificity to complete the project.
  Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.
  Hint 2: You can use CSS inspection to het the colors from https://appbrewery.github.io/flag-of-laos/
-->

<body>
  <div class="flag">
    <p>The Flag</p> 
    <div> <!-- Red -->
      <div> <!-- Blue -->
        <p>
          of Laos
        </p>
      </div>
    </div>
  </div>

</html>
