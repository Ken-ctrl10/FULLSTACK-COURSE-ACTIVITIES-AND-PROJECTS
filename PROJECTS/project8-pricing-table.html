<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project 8: Pricing Table | Udemy</title>

  <link rel="stylesheet" href="./css-files/project8.css">
</head>

<body>
  <h1>Pricing Table</h1>

  <div class="container">

    <div class="basic">
      <p class="card-option">Basic</p>
      <h2 class="sub-price">$11.99/month</h2>
      <div class="card-details">
        <p>✅ 10GB Storage</p>
        <p>✅ 1 User</p>
        <p>✖️ Support</p>
      </div>
      <button class="btn">Sign in</button>
    </div>

    <div class="standard">
      <p class="card-option">Standard</p>
      <h2 class="sub-price">$19.99/month</h2>
      <div class="card-details">
        <p>✅ 50GB Storage</p>
        <p>✅ 5 User</p>
        <p>✅ Phone & Call Support</p>
      </div>
      <button class="btn">Sign in</button>
    </div>

    <div class="premium">
        <p class="card-option">Premium</p>
        <h2 class="sub-price">$49.99/month</h2>
        <div class="card-details">
          <p>✅ 100GB Storage</p>
          <p>✅ 10 User</p>
          <p>✅ 24/7 Support</p>
        </div>
        <button class="btn">Sign in</button>
    </div>

  </div>
</body>
</html>
