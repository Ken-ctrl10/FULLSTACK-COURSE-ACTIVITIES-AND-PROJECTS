<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Font Size HTML</title>

  <style>
    #pixel {
      font-size: 20px; /* 16 pixels */
    }

    #point {
      font-size: 20pt; /* 12 points */
    }

    #em {
      font-size: 1em; /* 1.5 times the size of the parent element */
    }

    #rem {
      font-size: 1rem; /* 1.5 times the size of the root element */
    }

    footer{
      font-size: 12pt;
    }

    html{
      font-size: xx-large;
    }

  </style>
</head>

<body>
  <p id="pixel">1 Pixel is 1/96 of an Inch.</p>
  <p id="point">1 Point is 1/72 of an Inch.</p>
  
  <footer>
    <p id="em">1em is 100% the size of the parent element.</p>
    <p id="rem">1rem is 100% the size of the root element.</p>
  </footer>
</body>
</html>
